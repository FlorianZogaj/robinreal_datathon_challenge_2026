<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robin Search</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Apple color system ──────────────────────────────────────────────── */
    :root {
      --bg:                  #000000;
      --bg-sidebar:          #1c1c1e;
      --bg-card:             #1c1c1e;
      --bg-input:            #2c2c2e;
      --bg-feat:             #2c2c2e;
      --border:              rgba(255,255,255,0.08);
      --border-card:         rgba(255,255,255,0.10);
      --border-input:        rgba(255,255,255,0.14);
      --text:                #ffffff;
      --text-logo:           #ffffff;
      --text-sub:            rgba(235,235,245,0.30);
      --text-session:        rgba(235,235,245,0.52);
      --text-session-active: #ffffff;
      --text-location:       rgba(235,235,245,0.46);
      --text-reason:         rgba(235,235,245,0.42);
      --text-meta:           rgba(235,235,245,0.38);
      --text-muted:          rgba(235,235,245,0.22);
      --text-dim:            rgba(235,235,245,0.10);
      --text-del:            rgba(235,235,245,0.18);
      --text-feat:           rgba(235,235,245,0.50);
      --price:               #30d158;
      --accent:              #0a84ff;
      --img-bg:              #000000;
      --img-placeholder:     rgba(255,255,255,0.14);
      --hover-session:       rgba(255,255,255,0.04);
      --active-session:      rgba(255,255,255,0.08);
      --refinement-bg:       rgba(48,209,88,0.08);
      --refinement-border:   rgba(48,209,88,0.25);
      --refinement-text:     #30d158;
      --glow:                rgba(10,132,255,0.14);
      --glow-strong:         rgba(10,132,255,0.20);
    }

    html[data-theme="light"] {
      --bg:                  #f2f2f7;
      --bg-sidebar:          #f2f2f7;
      --bg-card:             #ffffff;
      --bg-input:            rgba(118,118,128,0.12);
      --bg-feat:             rgba(118,118,128,0.10);
      --border:              rgba(60,60,67,0.09);
      --border-card:         rgba(60,60,67,0.11);
      --border-input:        transparent;
      --text:                #000000;
      --text-logo:           #000000;
      --text-sub:            rgba(60,60,67,0.46);
      --text-session:        rgba(60,60,67,0.65);
      --text-session-active: #000000;
      --text-location:       rgba(60,60,67,0.55);
      --text-reason:         rgba(60,60,67,0.55);
      --text-meta:           rgba(60,60,67,0.50);
      --text-muted:          rgba(60,60,67,0.35);
      --text-dim:            rgba(60,60,67,0.16);
      --text-del:            rgba(60,60,67,0.25);
      --text-feat:           rgba(60,60,67,0.65);
      --price:               #1c8c3c;
      --accent:              #007aff;
      --img-bg:              #f2f2f7;
      --img-placeholder:     rgba(60,60,67,0.18);
      --hover-session:       rgba(60,60,67,0.04);
      --active-session:      rgba(60,60,67,0.08);
      --refinement-bg:       rgba(52,199,89,0.08);
      --refinement-border:   rgba(52,199,89,0.28);
      --refinement-text:     #248a3d;
      --glow:                rgba(0,122,255,0.10);
      --glow-strong:         rgba(0,122,255,0.15);
    }

    body {
      font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Scrollbar ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-card); border-radius: 2px; }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    #sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    #sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #sidebar-header .logo {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-logo);
      letter-spacing: -0.3px;
    }
    #sidebar-header .sub {
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 2px;
      font-weight: 400;
    }

    #theme-btn {
      background: var(--bg-feat);
      border: none;
      border-radius: 8px;
      color: var(--text-sub);
      font-size: 13px;
      padding: 5px 8px;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
      transition: background .15s, color .15s;
    }
    #theme-btn:hover { background: var(--active-session); color: var(--text); }

    #new-chat-btn {
      margin: 10px 10px 6px;
      padding: 9px 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      flex-shrink: 0;
      transition: opacity .15s;
      font-family: inherit;
      letter-spacing: -0.1px;
    }
    #new-chat-btn:hover { opacity: 0.82; }
    #new-chat-btn:active { opacity: 0.65; transform: scale(0.98); }

    #sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .session-item {
      padding: 8px 12px;
      margin: 1px 8px;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      transition: background .1s;
    }
    .session-item:hover { background: var(--hover-session); }
    .session-item.active { background: var(--active-session); }

    .session-title {
      font-size: 13px;
      color: var(--text-session);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 20px;
      font-weight: 400;
    }
    .session-item.active .session-title {
      color: var(--text-session-active);
      font-weight: 500;
    }

    .session-delete {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-del);
      font-size: 14px; cursor: pointer;
      padding: 2px 4px; border-radius: 4px;
      line-height: 1; opacity: 0;
      transition: opacity .1s, color .1s;
    }
    .session-item:hover .session-delete { opacity: 1; }
    .session-delete:hover { color: #ff453a; }

    /* ── Main area ───────────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100dvh;
    }

    #thread {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Chat bubbles ────────────────────────────────────────────────────── */
    .msg-user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      padding: 10px 16px;
      border-radius: 20px 20px 6px 20px;
      max-width: 70%;
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-wrap;
      font-weight: 400;
      letter-spacing: -0.1px;
    }

    .msg-results { align-self: stretch; }

    .results-meta {
      font-size: 12px;
      color: var(--text-meta);
      margin-bottom: 12px;
      font-weight: 500;
      letter-spacing: -0.1px;
    }

    .refinement-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--refinement-bg);
      border: 1px solid var(--refinement-border);
      color: var(--refinement-text);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 14px;
    }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .22s cubic-bezier(.4,0,.2,1), box-shadow .22s cubic-bezier(.4,0,.2,1);
      display: flex;
      flex-direction: column;
      animation: fadeIn .3s ease both;
      box-shadow: 0 2px 12px rgba(0,0,0,0.22);
    }
    .card:hover {
      transform: translateY(-2px) scale(1.004);
      box-shadow: 0 8px 32px rgba(0,0,0,0.34);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--img-bg);
      overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s ease;
    }
    .card:hover .card-img-wrap img { transform: scale(1.03); }

    .card-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--img-placeholder); font-size: 32px;
    }

    .card-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.32) 0%, transparent 52%);
      pointer-events: none;
    }

    .img-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(10px) saturate(180%);
      -webkit-backdrop-filter: blur(10px) saturate(180%);
      border: none; color: #fff;
      font-size: 16px; line-height: 1; padding: 7px 11px;
      border-radius: 10px; cursor: pointer; opacity: 0;
      transition: opacity .15s; z-index: 2;
    }
    .card-img-wrap:hover .img-nav { opacity: 1; }
    .img-nav-prev { left: 8px; }
    .img-nav-next { right: 8px; }
    .img-counter {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff; font-size: 10px; padding: 2px 8px;
      border-radius: 100px; z-index: 2; font-weight: 600;
    }
    .rank-badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--accent);
      color: #fff; font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 100px;
      z-index: 2; letter-spacing: -0.2px;
    }

    .card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text-logo); line-height: 1.3; letter-spacing: -0.2px; }
    .card-location { font-size: 12px; color: var(--text-location); font-weight: 400; }
    .card-price { font-size: 15px; font-weight: 600; color: var(--price); letter-spacing: -0.2px; }
    .card-reason { font-size: 12px; color: var(--text-reason); line-height: 1.45; margin-top: 3px; }
    .card-features { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .feat-tag {
      background: var(--bg-feat); color: var(--text-feat);
      font-size: 11px; padding: 2px 9px; border-radius: 100px;
      text-transform: capitalize; font-weight: 500;
    }

    .msg-error {
      align-self: flex-start;
      background: rgba(255,69,58,0.08);
      border: 1px solid rgba(255,69,58,0.20);
      color: #ff453a;
      padding: 10px 16px; border-radius: 14px;
      font-size: 13px; max-width: 72%;
    }

    .typing-indicator {
      align-self: flex-start;
      display: flex; align-items: center; gap: 5px;
      padding: 11px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 20px;
      color: var(--text-reason); font-size: 13px;
      animation: fadeIn .2s ease both;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: blink 1.4s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,60%,100% { opacity:.2; transform:scale(1); } 30% { opacity:1; transform:scale(1.25); } }

    /* ── Input bar ───────────────────────────────────────────────────────── */
    #input-bar {
      padding: 12px 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-sidebar);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #query-input {
      flex: 1;
      background: var(--bg-input);
      border: 1.5px solid transparent;
      border-radius: 14px;
      color: var(--text);
      font-size: 15px;
      padding: 11px 15px;
      resize: none;
      outline: none;
      max-height: 140px;
      overflow-y: auto;
      line-height: 1.45;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
      letter-spacing: -0.1px;
    }
    #query-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }
    #query-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      border: none; border-radius: 50%;
      color: #fff; padding: 0;
      cursor: pointer; flex-shrink: 0;
      transition: opacity .15s, transform .1s;
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; margin-bottom: 4px;
    }
    #send-btn:hover { opacity: 0.80; }
    #send-btn:active { transform: scale(0.90); }
    #send-btn:disabled {
      background: var(--bg-feat);
      cursor: default; color: var(--text-muted);
    }

    .no-results { color: var(--text-meta); font-size: 14px; padding: 8px 0; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      user-select: none;
    }
    .empty-icon { font-size: 52px; margin-bottom: 4px; }
    .empty-title { font-size: 20px; font-weight: 700; color: var(--text-logo); opacity: 0.58; letter-spacing: -0.5px; }
    .empty-subtext { font-size: 14px; color: var(--text-sub); }
    .empty-chips {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      max-width: 480px; margin-top: 10px;
    }
    .empty-chip {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 100px;
      padding: 7px 16px;
      font-size: 13px; font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }
    .empty-chip:hover {
      background: var(--glow);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    /* ── Detail Modal ────────────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    @media (min-width: 640px) {
      #modal-overlay { align-items: center; padding: 20px; }
    }
    #modal-overlay.open { display: flex; animation: fadeIn .18s ease; }

    #modal {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 800px;
      max-height: 92vh;
      overflow-y: auto;
      position: relative;
      display: flex;
      flex-direction: column;
      animation: sheetUp .28s cubic-bezier(.4,0,.2,1) both;
      box-shadow: 0 -4px 40px rgba(0,0,0,0.30);
    }
    @media (min-width: 640px) {
      #modal {
        border-radius: 20px;
        animation: modalSlideUp .22s cubic-bezier(.4,0,.2,1) both;
        box-shadow: 0 24px 80px rgba(0,0,0,.50);
      }
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-close {
      position: absolute; top: 14px; right: 14px; z-index: 10;
      background: var(--bg-feat);
      border: none; border-radius: 50%;
      color: var(--text-sub); font-size: 15px;
      width: 30px; height: 30px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
      font-weight: 600;
    }
    .modal-close:hover { background: rgba(255,69,58,0.14); color: #ff453a; }

    .modal-gallery {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--img-bg);
      border-radius: 20px 20px 0 0;
      overflow: hidden;
      flex-shrink: 0;
    }
    .modal-gallery img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-gallery .img-nav { opacity: 0.78; font-size: 22px; padding: 8px 13px; }
    .modal-gallery:hover .img-nav { opacity: 1; }
    .modal-gallery-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--img-placeholder); font-size: 60px;
    }
    .modal-gallery::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.44) 0%, transparent 42%);
      pointer-events: none;
    }

    .modal-body { padding: 24px 28px 32px; display: flex; flex-direction: column; gap: 18px; }

    .modal-title { font-size: 21px; font-weight: 700; color: var(--text-logo); line-height: 1.25; letter-spacing: -0.4px; }

    .modal-match {
      display: inline-flex; align-items: flex-start; gap: 8px;
      font-size: 13px; color: var(--text-reason); line-height: 1.5;
      background: var(--bg-feat); border-radius: 12px;
      padding: 10px 14px;
    }

    .modal-address { font-size: 14px; color: var(--text-location); font-weight: 400; }

    .modal-stats { display: flex; flex-wrap: wrap; gap: 8px; }
    .stat-box {
      background: var(--bg-feat);
      border-radius: 14px;
      padding: 10px 16px;
      display: flex; flex-direction: column; gap: 3px;
      min-width: 86px;
    }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .stat-value { font-size: 17px; font-weight: 600; color: var(--text-logo); letter-spacing: -0.3px; }
    .stat-value.price-val { color: var(--price); }

    .modal-section-title {
      font-size: 11px; font-weight: 600; color: var(--text-sub);
      text-transform: uppercase; letter-spacing: .7px;
    }

    .modal-description { font-size: 15px; color: var(--text); line-height: 1.70; white-space: pre-wrap; letter-spacing: -0.1px; }

    .modal-features { display: flex; flex-wrap: wrap; gap: 7px; }
    .modal-feat-tag {
      background: var(--bg-feat); color: var(--text-feat);
      font-size: 13px; padding: 5px 13px; border-radius: 100px;
      text-transform: capitalize; font-weight: 500;
    }

    .modal-breakdown { width: 100%; border-collapse: collapse; font-size: 13px; }
    .modal-breakdown td { padding: 5px 8px 5px 0; color: var(--text-reason); }
    .modal-breakdown td:first-child { color: var(--text-sub); text-transform: capitalize; min-width: 130px; }
    .modal-breakdown td:last-child { text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }
    .modal-breakdown tr.breakdown-total td { border-top: 1px solid var(--border-card); padding-top: 8px; color: var(--text); font-weight: 700; }

    .modal-links { display: flex; flex-wrap: wrap; gap: 10px; }
    .modal-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 12px;
      font-size: 14px; font-weight: 600; text-decoration: none;
      transition: opacity .15s; letter-spacing: -0.2px;
    }
    .modal-link:hover { opacity: 0.78; }
    .modal-link-primary { background: var(--accent); color: #fff; }
    .modal-link-secondary { background: var(--bg-feat); color: var(--text); }

    /* ── Map panel ───────────────────────────────────────────────────────── */
    #map-panel {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--bg);
      transition: width .25s ease;
      position: relative;
      z-index: 0;
    }
    #map-panel.hidden { width: 0; overflow: hidden; border-left: none; }

    #map-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    #map-container { flex: 1; }

    .map-pin {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--accent);
      color: #fff; font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 2px 8px rgba(10,132,255,0.35);
      cursor: pointer;
    }
    .map-pin-landmark {
      background: #ff453a; font-size: 14px;
      width: 30px; height: 30px;
      box-shadow: 0 2px 8px rgba(255,69,58,0.40);
    }

    #map-toggle-btn {
      background: var(--bg-feat);
      border: none;
      border-radius: 8px; color: var(--text-sub); font-size: 11px;
      padding: 5px 10px; cursor: pointer; flex-shrink: 0;
      transition: all .15s; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.4px;
      font-family: inherit;
    }
    #map-toggle-btn:hover { background: var(--active-session); color: var(--text); }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div>
      <div class="logo">Robin</div>
      <div class="sub">Real-estate search</div>
    </div>
    <div style="display:flex;gap:6px">
      <button id="map-toggle-btn" title="Toggle map">Map</button>
      <button id="theme-btn" title="Toggle light/dark mode">☀</button>
    </div>
  </div>
  <button id="new-chat-btn">+ New Chat</button>
  <div id="sessions-list"></div>
</div>

<div id="main">
  <div id="thread"></div>
  <div id="input-bar">
    <textarea
      id="query-input"
      rows="1"
      placeholder="3-room apartment in Zurich under 2800 CHF with balcony…"
    ></textarea>
    <button id="send-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
      </svg>
    </button>
  </div>
</div>

<div id="map-panel">
  <div id="map-header">
    <span>Map</span>
  </div>
  <div id="map-container"></div>
</div>

<div id="modal-overlay">
  <div id="modal"></div>
</div>

<script>
  const thread   = document.getElementById('thread');
  const input    = document.getElementById('query-input');
  const btn      = document.getElementById('send-btn');
  const newBtn   = document.getElementById('new-chat-btn');
  const sidelist = document.getElementById('sessions-list');
  const themeBtn = document.getElementById('theme-btn');

  // ── Theme ────────────────────────────────────────────────────────────────
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeBtn.textContent = theme === 'dark' ? '☀' : '☾';
    localStorage.setItem('robin_theme', theme);
  }

  themeBtn.addEventListener('click', () => {
    const curr = document.documentElement.getAttribute('data-theme') || 'dark';
    applyTheme(curr === 'dark' ? 'light' : 'dark');
  });

  // ── State ────────────────────────────────────────────────────────────────
  let sessions  = [];
  let activeIdx = -1;

  // ── Persistence ──────────────────────────────────────────────────────────
  function save() {
    try {
      localStorage.setItem('robin_sessions', JSON.stringify(sessions));
      localStorage.setItem('robin_active', String(activeIdx));
    } catch (_) {}
  }

  function load() {
    applyTheme(localStorage.getItem('robin_theme') || 'dark');
    try {
      const raw = localStorage.getItem('robin_sessions');
      sessions = raw ? JSON.parse(raw) : [];
    } catch (_) { sessions = []; }
    const ai = localStorage.getItem('robin_active');
    activeIdx = ai !== null ? parseInt(ai) : -1;
    if (sessions.length === 0 || activeIdx < 0 || activeIdx >= sessions.length) {
      createNewSession(false);
    } else {
      renderSidebar();
      renderThread();
    }
  }

  // ── Session management ───────────────────────────────────────────────────
  function createNewSession(saveIt = true) {
    sessions.push({ localId: crypto.randomUUID(), serverId: null, title: 'New search', messages: [] });
    activeIdx = sessions.length - 1;
    renderSidebar();
    thread.innerHTML = '';
    showEmptyState();
    clearMap();
    if (saveIt) save();
    input.focus();
  }

  function switchSession(idx) {
    if (idx === activeIdx) return;
    activeIdx = idx;
    renderSidebar();
    renderThread();
    save();
    input.focus();
  }

  function deleteSession(idx, e) {
    e.stopPropagation();
    sessions.splice(idx, 1);
    if (sessions.length === 0) { createNewSession(); return; }
    activeIdx = Math.min(activeIdx, sessions.length - 1);
    if (idx <= activeIdx && activeIdx > 0) activeIdx--;
    renderSidebar();
    renderThread();
    save();
  }

  function currentSession() { return sessions[activeIdx]; }

  // ── Sidebar rendering ────────────────────────────────────────────────────
  function renderSidebar() {
    sidelist.innerHTML = '';
    sessions.forEach((s, i) => {
      const item = document.createElement('div');
      item.className = 'session-item' + (i === activeIdx ? ' active' : '');

      const titleEl = document.createElement('div');
      titleEl.className = 'session-title';
      titleEl.textContent = s.title;
      item.appendChild(titleEl);

      const del = document.createElement('button');
      del.className = 'session-delete';
      del.textContent = '×';
      del.title = 'Delete';
      del.addEventListener('click', e => deleteSession(i, e));
      item.appendChild(del);

      item.addEventListener('click', () => switchSession(i));
      sidelist.appendChild(item);
    });
  }

  // ── Thread rendering ─────────────────────────────────────────────────────
  function showEmptyState() {
    const el = document.createElement('div');
    el.className = 'empty-state';
    const examples = [
      '3-room flat in Zürich under CHF 2500',
      'Bright apartment within 1.5km of ETH Zürich',
      'Cheap student flat in Winterthur with good public transport connection',
      'Cosy studio in Geneva, furnished',
    ];
    el.innerHTML = `
      <div class="empty-icon">🏠</div>
      <div class="empty-title">Find your Swiss home</div>
      <div class="empty-subtext">Describe what you're looking for in natural language</div>
      <div class="empty-chips">
        ${examples.map(q => `<button class="empty-chip">${q}</button>`).join('')}
      </div>`;
    el.querySelectorAll('.empty-chip').forEach(chip => {
      chip.addEventListener('click', () => { input.value = chip.textContent; send(); });
    });
    thread.appendChild(el);
  }

  function renderThread() {
    thread.innerHTML = '';
    const sess = currentSession();
    if (!sess || sess.messages.length === 0) { showEmptyState(); return; }
    let lastResults = null;
    for (const msg of sess.messages) {
      if (msg.type === 'user') {
        appendUserBubble(msg.content, false);
      } else if (msg.type === 'results') {
        appendResultsBlock(msg.listings, msg.meta, msg.prevMeta, false);
        lastResults = msg;
      } else if (msg.type === 'error') {
        appendErrorBubble(msg.content, false);
      }
    }
    thread.scrollTop = thread.scrollHeight;
    if (lastResults) updateMap(lastResults.listings, lastResults.meta);
  }

  // ── Thread helpers ───────────────────────────────────────────────────────
  function appendEl(el) {
    const es = thread.querySelector('.empty-state');
    if (es) es.remove();
    thread.appendChild(el);
    thread.scrollTop = thread.scrollHeight;
    return el;
  }

  function appendUserBubble(text, scroll = true) {
    const el = document.createElement('div');
    el.className = 'msg-user';
    el.textContent = text;
    if (scroll) appendEl(el); else thread.appendChild(el);
    return el;
  }

  function appendErrorBubble(text, scroll = true) {
    const el = document.createElement('div');
    el.className = 'msg-error';
    el.textContent = text;
    if (scroll) appendEl(el); else thread.appendChild(el);
    return el;
  }

  function makeTyping() {
    const el = document.createElement('div');
    el.className = 'typing-indicator';
    el.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span><span style="margin-left:4px">Searching…</span>';
    return appendEl(el);
  }

  function appendResultsBlock(listings, meta, prevMeta, scroll = true) {
    const wrap = document.createElement('div');
    wrap.className = 'msg-results';

    if (prevMeta) {
      const diffs = computeRefinements(meta, prevMeta);
      if (diffs.length) {
        const pill = document.createElement('div');
        pill.className = 'refinement-pill';
        pill.textContent = '↻ Adjusted: ' + diffs.join(' · ');
        wrap.appendChild(pill);
      }
    }

    const metaEl = document.createElement('div');
    metaEl.className = 'results-meta';
    if (listings.length) {
      const filters = meta && meta.extracted_hard_filters ? _filtersLabel(meta.extracted_hard_filters, meta.extracted_soft_facts) : '';
      metaEl.textContent = `${listings.length} result${listings.length === 1 ? '' : 's'}${filters ? ' · ' + filters : ''}`;
    } else {
      metaEl.textContent = 'No listings matched your query.';
    }
    wrap.appendChild(metaEl);

    if (listings.length) {
      const grid = document.createElement('div');
      grid.className = 'cards-grid';
      listings.forEach((r, i) => {
        const card = buildCard(r, i);
        card.style.animationDelay = `${i * 28}ms`;
        grid.appendChild(card);
      });
      wrap.appendChild(grid);
    }

    if (scroll) {
      const es = thread.querySelector('.empty-state');
      if (es) es.remove();
      thread.appendChild(wrap);
      wrap.scrollIntoView({ block: 'start', behavior: 'smooth' });
    } else {
      thread.appendChild(wrap);
    }
    if (scroll) updateMap(listings, meta);
    return wrap;
  }

  function _filtersLabel(f, soft) {
    const parts = [];
    if (f.city && f.city.length) parts.push(f.city.join('/'));
    if (f.max_price != null) parts.push('≤' + formatPrice(f.max_price));
    if (f.min_price != null) parts.push('≥' + formatPrice(f.min_price));
    if (f.min_rooms != null && f.max_rooms != null && f.min_rooms === f.max_rooms)
      parts.push(f.min_rooms + ' rooms');
    else if (f.min_rooms != null) parts.push('≥' + f.min_rooms + ' rooms');
    if (f.features && f.features.length) parts.push(f.features.join(', ').replaceAll('_', ' '));
    if (f.radius_km != null) {
      const name = soft?.landmark_name ?? (f.latitude != null ? `${f.latitude.toFixed(3)}, ${f.longitude.toFixed(3)}` : null);
      parts.push('within ' + f.radius_km + 'km' + (name ? ' of ' + name : ''));
    }
    return parts.join(' · ');
  }

  function computeRefinements(meta, prevMeta) {
    const curr = (meta && meta.extracted_hard_filters) || {};
    const prev = (prevMeta && prevMeta.extracted_hard_filters) || {};
    const diffs = [];
    for (const [k, label] of [['max_price','max price'],['min_price','min price']]) {
      if (curr[k] !== prev[k]) {
        if (curr[k] != null) diffs.push(`${label} → CHF ${curr[k].toLocaleString()}`);
        else diffs.push(`${label} removed`);
      }
    }
    for (const [k, label] of [['min_rooms','min rooms'],['max_rooms','max rooms']]) {
      if (curr[k] !== prev[k] && curr[k] != null) diffs.push(`${label} → ${curr[k]}`);
    }
    const prevCities = JSON.stringify((prev.city || []).sort());
    const currCities = JSON.stringify((curr.city || []).sort());
    if (currCities !== prevCities && curr.city && curr.city.length)
      diffs.push('city → ' + curr.city.join(', '));
    const prevFeats = JSON.stringify((prev.features || []).sort());
    const currFeats = JSON.stringify((curr.features || []).sort());
    if (currFeats !== prevFeats && curr.features && curr.features.length)
      diffs.push('features → ' + curr.features.join(', ').replaceAll('_', ' '));
    return diffs.slice(0, 4);
  }

  // ── Card builder ─────────────────────────────────────────────────────────
  function formatPrice(p) {
    if (p == null) return 'Price n/a';
    return new Intl.NumberFormat('de-CH', { style: 'currency', currency: 'CHF', maximumFractionDigits: 0 }).format(p);
  }

  function buildCard(result, index) {
    const listing   = result.listing;
    const imageUrls = [listing.hero_image_url, ...(listing.image_urls ?? [])].filter(Boolean);
    const unique    = [...new Set(imageUrls)].map(u => `/images/proxy?url=${encodeURIComponent(u)}`);
    let imgIdx = 0;

    const card = document.createElement('div');
    card.className = 'card';

    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img-wrap';

    const rankBadge = document.createElement('span');
    rankBadge.className = 'rank-badge';
    rankBadge.textContent = `#${index + 1}`;
    imgWrap.appendChild(rankBadge);

    if (unique.length) {
      const img = document.createElement('img');
      img.src = unique[0];
      img.alt = listing.title;
      img.loading = 'lazy';
      imgWrap.appendChild(img);

      if (unique.length > 1) {
        const counter = document.createElement('span');
        counter.className = 'img-counter';
        counter.textContent = `1 / ${unique.length}`;
        imgWrap.appendChild(counter);

        const prev = document.createElement('button');
        prev.className = 'img-nav img-nav-prev';
        prev.textContent = '‹';
        prev.addEventListener('click', e => { e.stopPropagation(); navigate(-1); });

        const next = document.createElement('button');
        next.className = 'img-nav img-nav-next';
        next.textContent = '›';
        next.addEventListener('click', e => { e.stopPropagation(); navigate(1); });

        imgWrap.appendChild(prev);
        imgWrap.appendChild(next);

        function navigate(delta) {
          imgIdx = (imgIdx + delta + unique.length) % unique.length;
          img.src = unique[imgIdx];
          counter.textContent = `${imgIdx + 1} / ${unique.length}`;
        }
        img.onerror = () => {
          unique.splice(imgIdx, 1);
          if (!unique.length) { imgWrap.innerHTML = '<div class="card-img-placeholder">🏠</div>'; return; }
          imgIdx = Math.min(imgIdx, unique.length - 1);
          img.src = unique[imgIdx];
          counter.textContent = `${imgIdx + 1} / ${unique.length}`;
        };
      } else {
        img.onerror = () => { imgWrap.innerHTML = '<div class="card-img-placeholder">🏠</div>'; };
      }
    } else {
      const ph = document.createElement('div');
      ph.className = 'card-img-placeholder';
      ph.textContent = '🏠';
      imgWrap.appendChild(ph);
    }

    card.appendChild(imgWrap);

    const body = document.createElement('div');
    body.className = 'card-body';

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = listing.title;
    body.appendChild(title);

    const loc = document.createElement('div');
    loc.className = 'card-location';
    loc.textContent = [listing.city, listing.canton].filter(Boolean).join(', ') || '—';
    body.appendChild(loc);

    const price = document.createElement('div');
    price.className = 'card-price';
    price.textContent = `${formatPrice(listing.price_chf)}${listing.rooms ? ` · ${listing.rooms} rooms` : ''}`;
    body.appendChild(price);

    if (result.reason) {
      const reason = document.createElement('div');
      reason.className = 'card-reason';
      reason.textContent = result.reason;
      body.appendChild(reason);
    }

    const features = (listing.features ?? []).slice(0, 5);
    if (features.length) {
      const feats = document.createElement('div');
      feats.className = 'card-features';
      features.forEach(f => {
        const tag = document.createElement('span');
        tag.className = 'feat-tag';
        tag.textContent = f.replaceAll('_', ' ');
        feats.appendChild(tag);
      });
      body.appendChild(feats);
    }

    card.appendChild(body);
    card.addEventListener('click', () => showModal(result));
    return card;
  }

  // ── Send ─────────────────────────────────────────────────────────────────
  async function send() {
    const query = input.value.trim();
    if (!query) return;

    const sess = currentSession();
    const es = thread.querySelector('.empty-state');
    if (es) es.remove();

    appendUserBubble(query);
    sess.messages.push({ type: 'user', content: query });

    const prevResultsMsg = [...sess.messages].reverse().find(m => m.type === 'results');
    const prevMeta = prevResultsMsg ? prevResultsMsg.meta : null;

    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;

    const typing = makeTyping();

    try {
      const body = { query, limit: 20 };
      if (sess.serverId) body.session_id = sess.serverId;

      const res = await fetch('/listings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      typing.remove();

      if (!res.ok) {
        const errText = `Error ${res.status}: ${res.statusText}`;
        appendErrorBubble(errText);
        sess.messages.push({ type: 'error', content: errText });
        save();
        return;
      }

      const data = await res.json();

      if (data.session_id && !sess.serverId) sess.serverId = data.session_id;

      if (sess.title === 'New search') {
        sess.title = query.length > 38 ? query.slice(0, 36) + '…' : query;
        renderSidebar();
      }

      const listings = data.listings ?? [];
      const meta = data.meta || {};

      appendResultsBlock(listings, meta, prevMeta);
      sess.messages.push({ type: 'results', listings, meta, prevMeta });
      save();

    } catch (err) {
      typing.remove();
      const errText = `Network error: ${err.message}`;
      appendErrorBubble(errText);
      sess.messages.push({ type: 'error', content: errText });
      save();
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  // ── Detail Modal ─────────────────────────────────────────────────────────
  const modalOverlay = document.getElementById('modal-overlay');
  const modalEl      = document.getElementById('modal');

  function showModal(result) {
    const listing = result.listing;
    const imageUrls = [listing.hero_image_url, ...(listing.image_urls ?? [])].filter(Boolean);
    const unique = [...new Set(imageUrls)].map(u => `/images/proxy?url=${encodeURIComponent(u)}`);
    let imgIdx = 0;

    modalEl.innerHTML = '';

    // Close button
    const closeBtn = document.createElement('button');
    closeBtn.className = 'modal-close';
    closeBtn.textContent = '×';
    closeBtn.addEventListener('click', closeModal);
    modalEl.appendChild(closeBtn);

    // Gallery
    const gallery = document.createElement('div');
    gallery.className = 'modal-gallery';
    if (unique.length) {
      const img = document.createElement('img');
      img.src = unique[0];
      img.alt = listing.title;
      gallery.appendChild(img);
      if (unique.length > 1) {
        const counter = document.createElement('span');
        counter.className = 'img-counter';
        counter.textContent = `1 / ${unique.length}`;
        gallery.appendChild(counter);
        const prev = document.createElement('button');
        prev.className = 'img-nav img-nav-prev';
        prev.textContent = '‹';
        prev.addEventListener('click', () => navigate(-1));
        const next = document.createElement('button');
        next.className = 'img-nav img-nav-next';
        next.textContent = '›';
        next.addEventListener('click', () => navigate(1));
        gallery.appendChild(prev);
        gallery.appendChild(next);
        function navigate(delta) {
          imgIdx = (imgIdx + delta + unique.length) % unique.length;
          img.src = unique[imgIdx];
          counter.textContent = `${imgIdx + 1} / ${unique.length}`;
        }
        img.onerror = () => {
          unique.splice(imgIdx, 1);
          if (!unique.length) { gallery.innerHTML = '<div class="modal-gallery-placeholder">🏠</div>'; return; }
          imgIdx = Math.min(imgIdx, unique.length - 1);
          img.src = unique[imgIdx];
          counter.textContent = `${imgIdx + 1} / ${unique.length}`;
        };
      } else {
        img.onerror = () => { gallery.innerHTML = '<div class="modal-gallery-placeholder">🏠</div>'; };
      }
    } else {
      gallery.innerHTML = '<div class="modal-gallery-placeholder">🏠</div>';
    }
    modalEl.appendChild(gallery);

    // Body
    const body = document.createElement('div');
    body.className = 'modal-body';

    // Title
    const titleEl = document.createElement('div');
    titleEl.className = 'modal-title';
    titleEl.textContent = listing.title;
    body.appendChild(titleEl);

    // Match score + reason
    if (result.reason) {
      const matchEl = document.createElement('div');
      matchEl.className = 'modal-match';
      matchEl.textContent = `Match: ${(result.score * 100).toFixed(0)}%  ·  ${result.reason}`;
      body.appendChild(matchEl);
    }

    // Score breakdown
    const bd = result.score_breakdown;
    if (bd && Object.keys(bd).length) {
      const bdTitle = document.createElement('div');
      bdTitle.className = 'modal-section-title';
      bdTitle.textContent = 'Score Breakdown';
      body.appendChild(bdTitle);

      const LABELS = { landmark: 'Landmark proximity', image: 'Image similarity', text: 'Text match',
                       feature: 'Features', geo: 'Geo (distances)', soft_attr: 'Soft attributes' };
      const SA_LABELS = { brightness: 'Brightness', modernity: 'Modernity', family: 'Family-friendly',
                          value: 'Value / price', quietness: 'Quietness', spaciousness: 'Spaciousness',
                          views: 'Views', nature_proximity: 'Nature proximity' };
      const signals = ['landmark', 'image', 'text', 'feature', 'geo', 'soft_attr'].filter(k => bd[k] != null);

      const table = document.createElement('table');
      table.className = 'modal-breakdown';
      let total = 0;
      for (const k of signals) {
        const score = bd[k];
        const w = bd[k + '_w'];
        const contrib = score * w;
        total += contrib;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${LABELS[k]}</td><td>${score.toFixed(2)} × ${(w*100).toFixed(1)}%</td><td>= ${(contrib*100).toFixed(1)}%</td>`;
        table.appendChild(tr);
        // Sub-rows for soft attributes
        if (k === 'soft_attr' && bd.soft_attr_detail) {
          for (const [sk, sv] of Object.entries(bd.soft_attr_detail)) {
            const label = SA_LABELS[sk] || sk;
            const subTr = document.createElement('tr');
            subTr.innerHTML = `<td style="padding-left:18px;font-size:11px;color:var(--text-muted)">↳ ${label}</td><td style="font-size:11px;color:var(--text-muted)">${sv.toFixed(2)}</td><td></td>`;
            table.appendChild(subTr);
          }
        }
      }
      const totalRow = document.createElement('tr');
      totalRow.className = 'breakdown-total';
      totalRow.innerHTML = `<td>Total</td><td></td><td>${(total*100).toFixed(1)}%</td>`;
      table.appendChild(totalRow);
      body.appendChild(table);
    }

    // Address
    const addrParts = [listing.street, listing.postal_code, listing.city, listing.canton].filter(Boolean);
    if (addrParts.length) {
      const addr = document.createElement('div');
      addr.className = 'modal-address';
      addr.textContent = '📍 ' + addrParts.join(', ');
      body.appendChild(addr);
    }

    // Stats
    const stats = document.createElement('div');
    stats.className = 'modal-stats';
    function addStat(label, value, cls) {
      if (value == null || value === '') return;
      const box = document.createElement('div');
      box.className = 'stat-box';
      const lbl = document.createElement('div');
      lbl.className = 'stat-label';
      lbl.textContent = label;
      const val = document.createElement('div');
      val.className = 'stat-value' + (cls ? ' ' + cls : '');
      val.textContent = value;
      box.append(lbl, val);
      stats.appendChild(box);
    }
    addStat('Price', listing.price_chf ? formatPrice(listing.price_chf) + '/mo' : null, 'price-val');
    addStat('Rooms', listing.rooms);
    addStat('Area', listing.living_area_sqm ? listing.living_area_sqm + ' m²' : null);
    addStat('Available', listing.available_from);
    addStat('Offer', listing.offer_type);
    addStat('Category', listing.object_category);
    addStat('Type', listing.object_type);
    if (stats.children.length) body.appendChild(stats);

    // Features
    if (listing.features && listing.features.length) {
      const ft = document.createElement('div');
      ft.className = 'modal-section-title';
      ft.textContent = 'Features';
      body.appendChild(ft);
      const feats = document.createElement('div');
      feats.className = 'modal-features';
      listing.features.forEach(f => {
        const tag = document.createElement('span');
        tag.className = 'modal-feat-tag';
        tag.textContent = f.replaceAll('_', ' ');
        feats.appendChild(tag);
      });
      body.appendChild(feats);
    }

    // Description
    if (listing.description) {
      const dt = document.createElement('div');
      dt.className = 'modal-section-title';
      dt.textContent = 'Description';
      body.appendChild(dt);
      const desc = document.createElement('div');
      desc.className = 'modal-description';
      // Convert HTML tags and markdown bold to readable text
      let cleanDesc = listing.description
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<\/p>/gi, '\n')
        .replace(/<[^>]+>/g, '')
        .replace(/\*\*(.+?)\*\*/g, '$1')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
      desc.textContent = cleanDesc;
      body.appendChild(desc);
    }

    // Links
    const links = document.createElement('div');
    links.className = 'modal-links';
    if (listing.original_listing_url) {
      const a = document.createElement('a');
      a.className = 'modal-link modal-link-primary';
      a.href = listing.original_listing_url;
      a.target = '_blank'; a.rel = 'noopener';
      a.textContent = 'Open original listing ↗';
      links.appendChild(a);
    }
    if (listing.latitude && listing.longitude) {
      const a = document.createElement('a');
      a.className = 'modal-link modal-link-secondary';
      a.href = `https://www.openstreetmap.org/?mlat=${listing.latitude}&mlon=${listing.longitude}&zoom=16`;
      a.target = '_blank'; a.rel = 'noopener';
      a.textContent = 'View on map ↗';
      links.appendChild(a);
    }
    if (links.children.length) body.appendChild(links);

    modalEl.appendChild(body);
    modalOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Input events ─────────────────────────────────────────────────────────
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  btn.addEventListener('click', send);
  newBtn.addEventListener('click', () => createNewSession());

  // ── Map ──────────────────────────────────────────────────────────────────
  const mapPanel      = document.getElementById('map-panel');
  const mapToggleBtn  = document.getElementById('map-toggle-btn');
  let _map            = null;
  let _mapMarkers     = [];
  let _mapCircle      = null;
  let _mapLandmark    = null;

  function _initMap() {
    if (_map) return;
    _map = L.map('map-container', { zoomControl: true })
             .setView([47.3769, 8.5417], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(_map);
  }

  function clearMap() {
    _mapMarkers.forEach(m => m.remove());
    _mapMarkers = [];
    if (_mapCircle)   { _mapCircle.remove();   _mapCircle   = null; }
    if (_mapLandmark) { _mapLandmark.remove();  _mapLandmark = null; }
  }

  function updateMap(listings, meta) {
    if (mapPanel.classList.contains('hidden')) return;
    _initMap();
    clearMap();

    const bounds = [];
    const soft = meta?.extracted_soft_facts || {};
    const hard = meta?.extracted_hard_filters || {};

    // Radius circle (hard filter) — draw first so pins appear on top
    if (hard.latitude != null && hard.longitude != null && hard.radius_km != null) {
      _mapCircle = L.circle([hard.latitude, hard.longitude], {
        radius: hard.radius_km * 1000,
        color: '#0a84ff', fillColor: '#0a84ff',
        fillOpacity: 0.06, weight: 2, dashArray: '6 4',
      }).addTo(_map);
      bounds.push([hard.latitude, hard.longitude]);
    }

    // Landmark pin
    if (soft.landmark_lat != null && soft.landmark_lon != null) {
      const icon = L.divIcon({
        html: `<div class="map-pin map-pin-landmark" title="${soft.landmark_name || 'Landmark'}">★</div>`,
        className: '', iconSize: [30, 30], iconAnchor: [15, 15],
      });
      _mapLandmark = L.marker([soft.landmark_lat, soft.landmark_lon], { icon, zIndexOffset: 1000 })
        .addTo(_map)
        .bindPopup(`<b>${soft.landmark_name || 'Landmark'}</b>`);
      bounds.push([soft.landmark_lat, soft.landmark_lon]);
    }

    // Listing pins
    listings.forEach((result, i) => {
      const { latitude, longitude, title, price_chf, city } = result.listing;
      if (latitude == null || longitude == null) return;
      const icon = L.divIcon({
        html: `<div class="map-pin">${i + 1}</div>`,
        className: '', iconSize: [26, 26], iconAnchor: [13, 13],
      });
      const marker = L.marker([latitude, longitude], { icon })
        .addTo(_map)
        .bindTooltip(`#${i + 1} ${title}<br>CHF ${price_chf?.toLocaleString() || '?'}/mo`, { direction: 'top', offset: [0, -10] });
      marker.on('click', () => showModal(result));
      _mapMarkers.push(marker);
      bounds.push([latitude, longitude]);
    });

    if (bounds.length > 0) {
      _map.fitBounds(bounds, { padding: [32, 32], maxZoom: 15 });
    }
  }

  function toggleMap() {
    const hidden = mapPanel.classList.toggle('hidden');
    mapToggleBtn.style.color = hidden ? '' : 'var(--accent)';
    if (!hidden) {
      // Panel just became visible — Leaflet needs a size update
      setTimeout(() => { if (_map) _map.invalidateSize(); }, 210);
      // Replay last results onto map
      const sess = currentSession();
      if (sess) {
        const last = [...sess.messages].reverse().find(m => m.type === 'results');
        if (last) updateMap(last.listings, last.meta);
      }
    }
  }

  mapToggleBtn.addEventListener('click', toggleMap);

  // ── Boot ─────────────────────────────────────────────────────────────────
  load();
</script>
</body>
</html>
